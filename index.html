<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e8ebf0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== KARTU UTAMA ===== */
        .card {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border-radius: 12px;
            padding: 32px 36px 28px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
            border: 1px solid #dce1e8;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-left .icon-lock {
            background: #3b2e5e;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
        }

        .header-left .domain {
            font-size: 16px;
            font-weight: 600;
            color: #1c1c2a;
            letter-spacing: -0.2px;
        }

        .header-left .domain .badge {
            font-weight: 400;
            color: #6a6a7e;
            font-size: 13px;
            margin-left: 4px;
        }

        .header-right {
            background: #eef1f6;
            padding: 4px 14px 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
            color: #2c2c3e;
            display: flex;
            align-items: center;
            gap: 5px;
            letter-spacing: 0.3px;
        }

        .header-right i {
            color: #e6a020;
            font-size: 13px;
        }

        /* ===== JUDUL ===== */
        .title {
            font-size: 22px;
            font-weight: 600;
            color: #13131e;
            margin-bottom: 10px;
            letter-spacing: -0.3px;
        }

        .desc {
            font-size: 15px;
            color: #3d3d52;
            line-height: 1.6;
            padding-left: 16px;
            border-left: 3px solid #cfd6e3;
            padding-top: 2px;
            padding-bottom: 2px;
            margin-bottom: 28px;
            background: #f8f9fc;
            border-radius: 0 6px 6px 0;
            padding-right: 12px;
        }

        .desc strong {
            color: #1a1a2e;
        }

        /* ===== KOTAK VERIFIKASI ===== */
        .verify-box {
            background: #f5f7fb;
            border: 1px solid #e2e7ef;
            border-radius: 16px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            transition: background 0.15s;
        }

        .verify-box:hover {
            background: #f1f4fa;
        }

        /* Checkbox custom */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: #1b1b2b;
            user-select: none;
        }

        .checkbox-label input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            background: white;
            border: 2px solid #b6c1d4;
            border-radius: 6px;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.12s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .checkbox-label input[type="checkbox"]:checked {
            background: #1f6fb5;
            border-color: #1f6fb5;
        }

        .checkbox-label input[type="checkbox"]:checked::after {
            content: "✓";
            font-size: 18px;
            font-weight: 700;
            color: white;
            line-height: 1;
        }

        .checkbox-label .icon-user {
            color: #3178b3;
            margin-right: 4px;
        }

        /* Badge CLOUDFLARE */
        .cf-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            color: #34445e;
            background: #e8edf6;
            padding: 4px 16px 4px 12px;
            border-radius: 40px;
            letter-spacing: 0.4px;
        }

        .cf-badge i {
            color: #f2831e;
            font-size: 18px;
        }

        /* ===== PESAN STATUS ===== */
        .status-msg {
            margin-top: 16px;
            font-size: 14px;
            color: #1f6b3a;
            background: #e4f0e9;
            padding: 8px 18px;
            border-radius: 40px;
            display: inline-block;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .status-msg.show {
            opacity: 1;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .card {
                padding: 22px 18px;
            }
            .verify-box {
                flex-direction: column;
                align-items: flex-start;
            }
            .cf-badge {
                margin-left: 0;
            }
            .title {
                font-size: 19px;
            }
        }
    </style>
</head>
<body>

<div class="card">

    <!-- ===== HEADER ===== -->
    <div class="header">
        <div class="header-left">
            <div class="icon-lock">🔒</div>
            <span class="domain">en.gleeden.com <span class="badge">🔒</span></span>
        </div>
        <div class="header-right">
            <i class="fas fa-shield-alt"></i> Aman
        </div>
    </div>

    <!-- ===== JUDUL + DESKRIPSI ===== -->
    <h1 class="title">Performing security verification</h1>
    <div class="desc">
        This website uses a security service to protect against malicious bots.
        This page is displayed while the website verifies you are <strong>not a bot</strong>.
    </div>

    <!-- ===== KOTAK VERIFIKASI ===== -->
    <div class="verify-box">
        <label class="checkbox-label" id="verifyLabel">
            <input type="checkbox" id="humanCheckbox">
            <span><i class="fas fa-user-check icon-user"></i> Verify you are human</span>
        </label>
        <div class="cf-badge">
            <i class="fas fa-cloud"></i> CLOUDFLARE
        </div>
    </div>

    <!-- ===== PESAN STATUS ===== -->
    <div id="statusMessage" class="status-msg">
        <i class="fas fa-check-circle"></i> Verifikasi berhasil! Mengalihkan...
    </div>

    <!-- ===== LINK ADSTERRA (TERSEMBUNYI) ===== -->
    <a id="adsterraLink" href="#" style="display:none;"></a>

</div>

<!-- ===== FONT AWESOME UNTUK IKON ===== -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<script>
    (function() {
        // =====================================================
        //  GANTI URL INI DENGAN DIRECT LINK ADSTERRA ANDA
        // =====================================================
        const ADSTERRA_URL = "https://oversightexcitement.com/waj01tcu?key=dad6d89994c5673e298839c6d3cb0e9b";
        // =====================================================

        const checkbox = document.getElementById('humanCheckbox');
        const statusMsg = document.getElementById('statusMessage');
        const link = document.getElementById('adsterraLink');

        // Set link tujuan
        link.href = ADSTERRA_URL;

        checkbox.addEventListener('change', function() {
            if (this.checked) {
                // Tampilkan pesan
                statusMsg.innerHTML = '<i class="fas fa-check-circle"></i> Verifikasi berhasil! Mengalihkan...';
                statusMsg.classList.add('show');

                // Redirect setelah jeda singkat (seperti efek verifikasi)
                setTimeout(function() {
                    window.location.href = ADSTERRA_URL;
                }, 700);
            } else {
                statusMsg.classList.remove('show');
            }
        });
    })();
</script>

</body>
</html>
